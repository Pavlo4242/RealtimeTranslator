name: Build IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same branch
#concurrency:
 # group: ${{ github.workflow }}-${{ github.ref }}
 # cancel-in-progress: true

jobs:
  build:
    name: Build ad-hoc signed IPA (iOS 26 · iPhone 16)
    runs-on: macos-26

    env:
      XCODE_PATH: /Applications/Xcode_26.app/Contents/Developer
      DERIVED_DATA: ${{ runner.temp }}/DerivedData
      SPM_CACHE: ${{ runner.temp }}/spm

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Select Xcode 26 (iOS 26 SDK) ─────────────────────────────────
      - name: Select Xcode 26
        run: |
          sudo xcode-select -s "$XCODE_PATH"
          xcodebuild -version
          xcrun simctl list runtimes

      # ── 3. Cache – Homebrew ──────────────────────────────────────────────
      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Cellar/xcodegen
          key: ${{ runner.os }}-brew-xcodegen-v1
          restore-keys: |
            ${{ runner.os }}-brew-xcodegen-

      # ── 4. Install XcodeGen ──────────────────────────────────────────────
      - name: Install XcodeGen
        run: |
          if command -v xcodegen &>/dev/null; then
            echo "XcodeGen already cached"
          else
            brew install xcodegen
          fi
          xcodegen version

      # ── 5. Generate Xcode project ───────────────────────────────────────
      - name: Generate .xcodeproj
        run: xcodegen generate --spec project.yml

      # ── 6. Cache – SPM packages ─────────────────────────────────────────
      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ${{ env.SPM_CACHE }}
          key: ${{ runner.os }}-spm-${{ hashFiles('project.yml') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # ── 7. Resolve SPM dependencies ─────────────────────────────────────
      - name: Resolve SPM dependencies
        run: |
          xcodebuild \
            -resolvePackageDependencies \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -clonedSourcePackagesDirPath "$SPM_CACHE"

      # ── 8. Cache – DerivedData ──────────────────────────────────────────
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ${{ env.DERIVED_DATA }}
          key: ${{ runner.os }}-dd-${{ hashFiles('project.yml', 'Sources/**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-dd-

      # ── 9. Build for iOS (generic device) ───────────────────────────────
      - name: Build
        run: |
          xcodebuild build \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath "$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$SPM_CACHE" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | tee build.log | tail -50

      # ── 10. Verify build for iPhone 16 Simulator ────────────────────────
      - name: Verify (iPhone 16 Simulator)
        run: |
          xcodebuild build \
            -project RealtimeTranslator.xcodeproj \
            -scheme RealtimeTranslator \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            -derivedDataPath "$DERIVED_DATA/sim" \
            -clonedSourcePackagesDirPath "$SPM_CACHE" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | tail -20

      # ── 11. Ad-hoc sign + package IPA ───────────────────────────────────
      - name: Package IPA
        run: |
          APP=$(find "$DERIVED_DATA" -name "*.app" \
                -path "*/Release-iphoneos/*" | head -1)
          echo "App bundle: $APP"
          [ -z "$APP" ] && { echo "ERROR: .app not found"; exit 1; }

          codesign --force --deep --sign "-" "$APP"

          mkdir -p Payload
          cp -r "$APP" Payload/RealtimeTranslator.app
          zip -r RealtimeTranslator.ipa Payload
          echo "IPA size: $(du -sh RealtimeTranslator.ipa | cut -f1)"

      # ── 12. Upload artifact ─────────────────────────────────────────────
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: RealtimeTranslator-IPA
          path: RealtimeTranslator.ipa
          retention-days: 14
          if-no-files-found: error

      # ── 13. Upload build log on failure ─────────────────────────────────
      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
