name: RealtimeTranslator

options:
  bundleIdPrefix: com.realtimetranslator
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  xcodeVersion: "16"

packages:
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.14.5"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  RealtimeTranslator:
    type: application
    platform: iOS
    deploymentTarget: "18.0"   # was "26.0" — fixed

    sources:
      - path: Sources/RealtimeTranslator
        type: group
        excludes:
          - "*.old"
          - "*.md"
          - "AppleTranslator.swift"
          - "WhisperEngine.swift"    # deleted; replaced by QwenEngine.swift

    resources:
      - Resources/Assets.xcassets

    dependencies:
      - package: FluidAudio
        product: FluidAudio

    info:
      path: Resources/Info.plist
    entitlements:
      path: Resources/RealtimeTranslator.entitlements

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.realtimetranslator.app
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/RealtimeTranslator.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
